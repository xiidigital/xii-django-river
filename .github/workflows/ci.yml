name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        django: ["4.2", "5.2", "6.0"]
        exclude:
          - python-version: "3.10"
            django: "6.0"
          - python-version: "3.11"
            django: "6.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Django~=${{ matrix.django }}.0" django-cte factory-boy pyhamcrest RestrictedPython
      - name: Check for missing migrations
        run: python manage.py makemigrations river --check --dry-run --settings=settings.with_sqlite3
      - name: Run tests
        run: python manage.py test river --settings=settings.with_sqlite3

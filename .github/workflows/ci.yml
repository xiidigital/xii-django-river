name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        django: ["4.2", "5.2", "6.0"]
        exclude:
          - python-version: "3.10"
            django: "6.0"
          - python-version: "3.11"
            django: "6.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Django~=${{ matrix.django }}.0" django-cte factory-boy pyhamcrest RestrictedPython
      - name: Check for missing migrations
        run: python manage.py makemigrations xii_django_river --check --dry-run --settings=settings.for_migrations_check
      - name: Run tests
        # --top-level-directory=. is required: `xii` is a PEP 420 namespace
        # package (no __init__.py, shared with xii-django-river-admin), and
        # without this flag unittest's dotted-label discovery auto-detects
        # the top-level dir by walking up from the label looking for
        # __init__.py - it stops one level too early at xii/django_river
        # (which does have one) instead of continuing to xii/, and
        # re-imports every test module a second time under the wrong
        # qualified name (django_river.tests.* instead of
        # xii.django_river.tests.*), which then collides with the app
        # registered under xii.django_river in INSTALLED_APPS. Passing the
        # real top-level dir explicitly skips that auto-detection entirely.
        run: python manage.py test xii.django_river --top-level-directory=. --settings=settings.with_sqlite3

  bdd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Django~=6.0.0" django-cte factory-boy pyhamcrest RestrictedPython behave-django
      - name: Run BDD scenarios (features/)
        run: python manage.py behave --no-input --settings=settings.for_behave

[tox]
envlist =
    py{310,311}-dj{42,52}
    py{312,313}-dj{42,52,60}

[testenv]
setenv =
    DJANGO_SETTINGS_MODULE = settings.with_sqlite3
deps =
    dj42: Django>=4.2,<5.0
    dj52: Django>=5.2,<5.3
    dj60: Django>=6.0,<6.1
    django-cte>=3.0
    factory-boy>=3.3
    pyhamcrest>=2.0
    RestrictedPython>=6.0
commands =
    # --top-level-directory=. is required: `xii` is a PEP 420 namespace
    # package (no __init__.py, shared with xii-django-river-admin), and
    # without this flag unittest's dotted-label discovery auto-detects the
    # top-level dir by walking up from the label looking for __init__.py -
    # it stops one level too early at xii/django_river (which does have one)
    # instead of continuing to xii/, and re-imports every test module a
    # second time under the wrong qualified name (django_river.tests.*
    # instead of xii.django_river.tests.*), which then collides with the
    # app registered under xii.django_river in INSTALLED_APPS. Passing the
    # real top-level dir explicitly skips that auto-detection entirely. See
    # the equivalent comment in .github/workflows/ci.yml.
    python manage.py test xii.django_river --top-level-directory=.
